<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NaviSea | Final</title>
  <style>
    :root { --navy: #001f3f; --aqua: #0074D9; --accent: #FF851B; --bg: #f0f2f5; }
    body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--navy); font-size: 14px; }
    .header { background: linear-gradient(135deg, var(--navy), var(--aqua)); color: white; padding: 10px; text-align: center; }
    .header h1 { margin: 0; font-size: 18px; }
    .container { max-width: 600px; margin: 0 auto; padding: 10px; }
    .card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 8px; box-sizing: border-box; }
    
    /* 選択エリアの強化 */
    .selection-container { border: 1px solid #eee; border-radius: 8px; max-height: 300px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 6px; background: #fafafa; }
    .item-row { display: flex; align-items: center; padding: 8px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-size: 10px; background: #fff; line-height: 1.2; user-select: none; }
    .item-row.selected { background: #0074D9 !important; color: white !important; border-color: #001f3f; }
    .item-row.selected span { color: white !important; }
    
    .btn-primary { background: var(--navy); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    
    /* 結果エリア */
    .plan-line { border-left: 2px solid var(--aqua); margin-left: 10px; padding-left: 10px; position: relative; margin-bottom: 6px; }
    .plan-line::before { content: ''; position: absolute; left: -5px; top: 4px; width: 8px; height: 8px; background: var(--aqua); border-radius: 50%; }
    .p-time { font-weight: bold; color: var(--aqua); margin-right: 8px; font-size: 13px; }
    .p-act { font-weight: bold; font-size: 13px; }
    .p-det { font-size: 11px; color: #666; display: block; }
    
    .wait-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; }
    .w-tag { background: #eee; padding: 1px 5px; border-radius: 3px; font-size: 9px; color: #555; }
    .tip-list { font-size: 11px; padding-left: 15px; margin: 8px 0 0; color: #444; }
  </style>
</head>
<body>

<div class="header"><h1>NaviSea 2026</h1></div>

<div class="container">
  <div class="card">
    <input id="key" type="password" placeholder="Gemini API Key" />
    <div style="display: flex; gap: 5px;">
      <input id="startTime" type="datetime-local" style="flex:2;" />
      <select id="persona" style="flex:1;">
        <option value="balanced">効率</option>
        <option value="thrill">絶叫</option>
        <option value="chill">散策</option>
      </select>
    </div>
    
    <label style="font-size:10px; color:#888;">タップして選択（デフォルト未選択）</label>
    <div id="selectionArea" class="selection-container">
      </div>
    
    <textarea id="notes" placeholder="予定・メモ（例：16時マゼランズ予約）" style="height: 40px; margin-top:8px;"></textarea>
    <button id="run" class="btn-primary">⛵ ルート生成</button>
  </div>

  <div id="resultCard" class="card" style="display:none;">
    <div id="out"></div>
  </div>
</div>

<script>
  const MODEL_NAME = "gemini-2.5-flash";
  const PROXY_API = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://queue-times.com/parks/275/queue_times.json`)}`;

  // --- 主要な全リストをあらかじめ定義（APIが死んでも選択可能にする） ---
  let masterData = [
    { name: "アナとエルサ", wait: "--" }, { name: "ラプンツェル", wait: "--" },
    { name: "ピーターパン", wait: "--" }, { name: "ビリーヴ！", wait: "--" },
    { name: "ソアリン", wait: "--" }, { name: "トイマニ", wait: "--" },
    { name: "タワテラ", wait: "--" }, { name: "センター", wait: "--" },
    { name: "インディ", wait: "--" }, { name: "レイジング", wait: "--" },
    { name: "マジックランプ", wait: "--" }, { name: "シンドバッド", wait: "--" },
    { name: "BBB", wait: "--" }, { name: "ニモ", wait: "--" },
    { name: "海底2万マイル", wait: "--" }, { name: "ジャンボリミッキー", wait: "--" },
    { name: "アクアトピア", wait: "--" }, { name: "タートル・トーク", wait: "--" },
    { name: "フライングカーペット", wait: "--" }, { name: "スカットルのスクーター", wait: "--" }
  ].sort((a,b) => a.name.localeCompare(b.name, "ja"));

  let selectedSet = new Set();

  window.onload = () => {
    document.getElementById("startTime").value = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    document.getElementById("key").value = localStorage.getItem("navisea_key") || "";
    renderList(); // まず固定リストを表示
    updateWaitTimes(); // 裏で待ち時間を取得して更新
  };

  function renderList() {
    const area = document.getElementById("selectionArea");
    area.innerHTML = "";
    masterData.forEach(item => {
      const isSelected = selectedSet.has(item.name);
      const row = document.createElement("div");
      row.className = `item-row ${isSelected ? 'selected' : ''}`;
      row.innerHTML = `<span style="flex:1">${item.name}</span><span style="color:var(--accent); margin-left:4px;">${item.wait}</span>`;
      
      // クリックイベントの確実な登録
      row.addEventListener('click', () => {
        if(selectedSet.has(item.name)) {
          selectedSet.delete(item.name);
          row.classList.remove('selected');
        } else {
          selectedSet.add(item.name);
          row.classList.add('selected');
        }
      });
      area.appendChild(row);
    });
  }

  async function updateWaitTimes() {
    try {
      const res = await fetch(PROXY_API);
      const wrapper = await res.json();
      const data = JSON.parse(wrapper.contents);
      const live = data.lands.flatMap(l => l.rides);
      
      // 1. 既存のリストに待ち時間を反映
      masterData.forEach(item => {
        const r = live.find(l => item.name.includes(l.name) || l.name.includes(item.name));
        if(r) item.wait = r.is_open ? r.wait_time : "休";
      });
      
      // 2. リストにない施設を追加（完全同期）
      live.forEach(l => {
        if(!masterData.some(m => m.name.includes(l.name) || l.name.includes(m.name))) {
          masterData.push({ name: l.name, wait: l.is_open ? l.wait_time : "休" });
        }
      });
      
      masterData.sort((a,b) => a.name.localeCompare(b.name, "ja"));
      renderList();
    } catch(e) { console.warn("Live update failed, using static list."); }
  }

  document.getElementById("run").onclick = async () => {
    const key = document.getElementById("key").value;
    if(!key) return alert("API Keyを入力してください");
    if(selectedSet.size === 0) return alert("場所を1つ以上選択してください");
    
    localStorage.setItem("navisea_key", key);
    const resultCard = document.getElementById("resultCard");
    const out = document.getElementById("out");

    resultCard.style.display = "block";
    out.innerHTML = "<div style='text-align:center;'>⚓️ 航路計算中...</div>";

    const prompt = `TDSプラン。
    【条件】${document.getElementById("startTime").value}開始 / ${Array.from(selectedSet).join(",")}希望 / ${document.getElementById("notes").value}
    【ルール】助言は15文字以内。
    JSONのみ：{"voyage_plan":[{"time":"HH:mm","activity":"場所","details":"助言"}],"tips":["短文1","短文2"]}`;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
      });
      const d = await res.json();
      const plan = JSON.parse(d.candidates[0].content.parts[0].text);
      
      let html = `<div style="margin-bottom:8px;">`;
      plan.voyage_plan.forEach(p => {
        html += `<div class="plan-line"><span class="p-time">${p.time}</span><span class="p-act">${p.activity}</span><span class="p-det">${p.details}</span></div>`;
      });
      html += `</div><div class="wait-tags">`;
      masterData.filter(i => selectedSet.has(i.name)).forEach(i => {
        html += `<span class="w-tag">${i.name}:${i.wait}</span>`;
      });
      html += `</div><ul class="tip-list">`;
      plan.tips.forEach(t => html += `<li>${t}</li>`);
      html += `</ul>`;
      out.innerHTML = html;
    } catch(e) { out.innerHTML = "エラー。再試行してください。"; }
  };
</script>
</body>
</html>
