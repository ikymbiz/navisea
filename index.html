<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NaviSea | 夢の航海プラン</title>
  <style>
    :root {
      --primary-pink: #f8dbd5;
      --accent-gold: #d4a373;
      --soft-blue: #b9d8eb;
      --text-main: #5a4a42;
      --bg-white: #ffffff;
      --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    body { 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; 
      margin: 0; 
      background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); 
      color: var(--text-main); 
      font-size: 14px;
      line-height: 1.6;
    }

    .header { 
      background: var(--bg-white); 
      padding: 20px 10px; 
      text-align: center; 
      border-bottom: 2px solid var(--primary-pink);
    }
    .header h1 { 
      margin: 0; 
      font-size: 20px; 
      letter-spacing: 2px; 
      color: var(--accent-gold);
      font-weight: 300;
    }
    .header p { margin: 5px 0 0; font-size: 10px; color: #aaa; }

    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    
    .card { 
      background: rgba(255, 255, 255, 0.9); 
      border-radius: 20px; 
      padding: 20px; 
      margin-bottom: 15px; 
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .section-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; color: var(--accent-gold); }
    
    input, select, textarea { 
      width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; 
      font-size: 14px; margin-bottom: 12px; box-sizing: border-box; background: #fff;
      color: var(--text-main);
    }
    
    /* 選択エリアの強化 */
    .selection-container { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 8px; 
      max-height: 400px; 
      overflow-y: auto; 
      padding: 5px;
      border-radius: 12px;
    }
    .item-row { 
      display: flex; flex-direction: column; justify-content: center;
      padding: 10px; border-radius: 15px; border: 1.5px solid #f0f0f0; 
      cursor: pointer; background: #fff; transition: 0.2s;
    }
    .item-row.selected { 
      background: var(--primary-pink) !important; 
      border-color: #ffc4bc !important;
    }
    .item-name { font-size: 10.5px; font-weight: bold; margin-bottom: 4px; line-height: 1.2; }
    .item-wait { font-size: 10px; color: var(--accent-gold); font-weight: bold; }
    .selected .item-wait { color: #fff; }

    .btn-primary { 
      background: linear-gradient(to right, var(--accent-gold), #e6b980); 
      color: white; width: 100%; padding: 15px; border: none; border-radius: 25px; 
      font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px;
    }
    
    /* 結果エリア */
    .plan-line { border-left: 2px dashed var(--primary-pink); margin-left: 15px; padding-left: 20px; position: relative; margin-bottom: 15px; }
    .plan-line::before { 
      content: '⚓'; position: absolute; left: -10px; top: 0; 
      font-size: 12px; background: #fff; padding: 2px;
    }
    .p-time { font-weight: bold; color: var(--accent-gold); font-size: 14px; display: block; }
    .p-act { font-weight: bold; font-size: 14px; color: var(--text-main); }
    .p-det { font-size: 12px; color: #888; display: block; margin-top: 2px; font-style: italic; }
    
    .wait-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; }
    .w-tag { background: #fdf0ee; padding: 4px 10px; border-radius: 20px; font-size: 10px; color: #d88e82; }
    
    .tip-box { 
      background: #fdfaf5; border-radius: 15px; padding: 15px; margin-top: 15px;
      border: 1px dashed var(--accent-gold);
    }
    .tip-list { font-size: 12px; padding-left: 20px; margin: 0; color: #6e5a4e; }
  </style>
</head>
<body>

<div class="header">
  <h1>NaviSea 2026</h1>
  <p>〜あなただけの特別な航路〜</p>
</div>

<div class="container">
  <div class="card">
    <span class="section-title">🗝 Key Setting</span>
    <input id="key" type="password" placeholder="Gemini API Keyを入力" />
    
    <span class="section-title">📅 Plan Setting</span>
    <div style="display: flex; gap: 8px;">
      <input id="startTime" type="datetime-local" />
      <select id="persona">
        <option value="balanced">おまかせ</option>
        <option value="thrill">絶叫全力！</option>
        <option value="photo">写真映え重視</option>
        <option value="chill">のんびりお散歩</option>
      </select>
    </div>
    
    <span class="section-title">🎀 Spots & Events (たっぷり追加しました！)</span>
    <div id="selectionArea" class="selection-container"></div>
    
    <textarea id="notes" placeholder="「ダッフィーに会いたい」「カクテルが飲みたい」などメモしてね" style="height: 60px; margin-top:12px;"></textarea>
    <button id="run" class="btn-primary">⛵ プランを作成する</button>
  </div>

  <div id="resultCard" class="card" style="display:none;">
    <span class="section-title">✨ Your Special Route</span>
    <div id="out"></div>
  </div>
</div>

<script>
  const MODEL_NAME = "gemini-2.0-flash";
  const PROXY_API = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://queue-times.com/parks/275/queue_times.json`)}`;

  // 【大幅拡充】アトラクション、ショー、グリーティング、季節イベント
  let masterData = [
    // ファンタジースプリングス
    { name: "アナとエルサのフローズンジャーニー", type: "FS" },
    { name: "ラプンツェルのランタンフェスティバル", type: "FS" },
    { name: "ピーターパンのネバーランドアドベンチャー", type: "FS" },
    { name: "フェアリー・ティンカーベルのビジーバギー", type: "FS" },
    // メジャーアトラクション
    { name: "ソアリン：ファンタスティック・フライト", type: "Major" },
    { name: "トイ・ストーリー・マニア！", type: "Major" },
    { name: "タワー・オブ・テラー", type: "Major" },
    { name: "センター・オブ・ジ・アース", type: "Major" },
    { name: "インディ・ジョーンズ®・アドベンチャー", type: "Major" },
    { name: "レイジングスピリッツ", type: "Major" },
    { name: "ニモ＆フレンズ・シーライダー", type: "Major" },
    { name: "海底2万マイル", type: "Major" },
    // シアター・ショー・パレード
    { name: "ビリーヴ！〜シー・オブ・ドリームス〜", type: "Show" },
    { name: "ビッグバンドビート(BBB)", type: "Show" },
    { name: "ジャンボリミッキー！レッツ・ダンス！", type: "Show" },
    { name: "ハーバー・グリーティング(季節イベント)", type: "Show" },
    { name: "ディズニー・ライト・ザ・ナイト(花火)", type: "Show" },
    { name: "マジックランプシアター", type: "Show" },
    { name: "マイ・フレンド・ダッフィー", type: "Show" },
    // グリーティング
    { name: "ミッキー＆フレンズ・グリーティングトレイル", type: "Greet" },
    { name: "ヴィレッジ・グリーティングプレイス(ダッフィー)", type: "Greet" },
    { name: "サルードス・アミーゴス！(ドナルド)", type: "Greet" },
    { name: "マーメイドラグーン・シアター(グリーティング)", type: "Greet" },
    // ゆったり・探検系
    { name: "ヴェネツィアン・ゴンドラ", type: "Chill" },
    { name: "タートル・トーク", type: "Chill" },
    { name: "シンドバッド・ストーリーブック・ヴォヤッジ", type: "Chill" },
    { name: "フォートレス・エクスプロレーション", type: "Chill" },
    { name: "ザ・レオナルド・チャレンジ", type: "Chill" },
    { name: "アクアトピア", type: "Chill" },
    { name: "ジャスミンのフライングカーペット", type: "Chill" },
    { name: "キャラバンカルーセル", type: "Chill" },
    { name: "スカットルのスクーター", type: "Chill" },
    { name: "フランダーのフライングフィッシュコースター", type: "Chill" },
    { name: "ブローフィッシュ・バルーンレース", type: "Chill" },
    { name: "ジャンピン・ジェリーフィッシュ", type: "Chill" },
    { name: "ワールプール", type: "Chill" },
    { name: "ディズニーシー・トランジットスチーマーライン", type: "Chill" },
    { name: "ディズニーシー・エレクトリックレールウェイ", type: "Chill" },
    { name: "ビッグシティ・ヴィークル", type: "Chill" }
  ].map(i => ({ ...i, wait: "--" })).sort((a,b) => a.name.localeCompare(b.name, "ja"));

  let selectedSet = new Set();

  window.onload = () => {
    const now = new Date();
    document.getElementById("startTime").value = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    document.getElementById("key").value = localStorage.getItem("navisea_key") || "";
    renderList();
    updateWaitTimes();
  };

  function renderList() {
    const area = document.getElementById("selectionArea");
    area.innerHTML = "";
    masterData.forEach(item => {
      const isSelected = selectedSet.has(item.name);
      const row = document.createElement("div");
      row.className = `item-row ${isSelected ? 'selected' : ''}`;
      row.innerHTML = `<span class="item-name">${item.name}</span><span class="item-wait">${item.wait}${item.wait.includes("分")||item.wait==="休"?"":"分"}</span>`;
      row.onclick = () => {
        if(selectedSet.has(item.name)) selectedSet.delete(item.name);
        else selectedSet.add(item.name);
        renderList();
      };
      area.appendChild(row);
    });
  }

  async function updateWaitTimes() {
    try {
      const res = await fetch(PROXY_API);
      const wrapper = await res.json();
      const data = JSON.parse(wrapper.contents);
      const live = data.lands.flatMap(l => l.rides);
      masterData.forEach(item => {
        const r = live.find(l => item.name.includes(l.name) || l.name.includes(item.name));
        if(r) item.wait = r.is_open ? r.wait_time : "休止";
      });
      renderList();
    } catch(e) { console.warn("Live update failed."); }
  }

  document.getElementById("run").onclick = async () => {
    const key = document.getElementById("key").value;
    if(!key) return alert("API Keyを入れてね🔑");
    if(selectedSet.size === 0) return alert("行きたい場所をえらんでね🎀");
    
    localStorage.setItem("navisea_key", key);
    const out = document.getElementById("out");
    document.getElementById("resultCard").style.display = "block";
    out.innerHTML = "<div style='text-align:center; padding:20px;'>⚓️ 最高の航海ルートを計算中...</div>";

    const prompt = `あなたはディズニーが大好きな20代女性の案内人です。TDSの回り方を提案して。
    【条件】${document.getElementById("startTime").value}開始 / ${Array.from(selectedSet).join(",")}希望 / メモ:${document.getElementById("notes").value}
    【ルール】詳細は「〜してね」「〜がおすすめだよ」のように優しく可愛らしい敬語で15文字以内。
    JSON形式のみ：{"voyage_plan":[{"time":"HH:mm","activity":"場所","details":"助言"}],"tips":["短いアドバイス1","アドバイス2"]}`;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
      });
      const d = await res.json();
      const plan = JSON.parse(d.candidates[0].content.parts[0].text);
      
      let html = `<div style="margin-top:10px;">`;
      plan.voyage_plan.forEach(p => {
        html += `<div class="plan-line"><span class="p-time">${p.time}</span><span class="p-act">${p.activity}</span><span class="p-det">${p.details}</span></div>`;
      });
      html += `</div><div class="tip-box"><span style="font-size:11px; font-weight:bold; color:var(--accent-gold);">🧸 ワンポイント・アドバイス</span><ul class="tip-list">`;
      plan.tips.forEach(t => html += `<li>${t}</li>`);
      html += `</ul></div>`;
      out.innerHTML = html;
    } catch(e) { out.innerHTML = "ごめんなさい、うまく計算できなかったみたい。もう一度試してみてね！"; }
  };
</script>
</body>
</html>
