<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NaviSea | 夢の航海プラン</title>
  <style>
    :root {
      --primary-pink: #f8dbd5;
      --accent-gold: #d4a373;
      --text-main: #5a4a42;
      --bg-white: #ffffff;
      --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    body { 
      font-family: "Helvetica Neue", Arial, sans-serif; 
      margin: 0; 
      background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); 
      color: var(--text-main); 
      font-size: 14px;
    }

    .header { background: var(--bg-white); padding: 20px 10px; text-align: center; border-bottom: 2px solid var(--primary-pink); }
    .header h1 { margin: 0; font-size: 20px; color: var(--accent-gold); font-weight: 300; letter-spacing: 2px; }

    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    .card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: var(--card-shadow); }

    .section-title { font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; color: var(--accent-gold); }
    
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; }
    
    #updateStatus { font-size: 10px; color: #999; text-align: right; margin-bottom: 8px; }

    .selection-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 380px; overflow-y: auto; padding: 5px; }
    .item-row { display: flex; flex-direction: column; padding: 10px; border-radius: 15px; border: 1.5px solid #f8f8f8; cursor: pointer; background: #fff; transition: 0.2s; }
    .item-row.selected { background: var(--primary-pink) !important; border-color: #ffc4bc !important; }
    .item-name { font-size: 10px; font-weight: bold; margin-bottom: 4px; line-height: 1.3; }
    .item-wait { font-size: 10px; color: var(--accent-gold); font-weight: bold; }
    .selected .item-name, .selected .item-wait { color: #fff; }

    .btn-primary { background: linear-gradient(to right, var(--accent-gold), #e6b980); color: white; width: 100%; padding: 16px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 15px; }
    
    /* デバッグ用エリア */
    .debug-panel { 
      background: #333; color: #0f0; font-family: monospace; font-size: 10px; 
      padding: 10px; border-radius: 10px; margin-top: 20px; max-height: 150px; overflow-y: auto;
      opacity: 0.8;
    }

    .plan-line { border-left: 2px dashed var(--primary-pink); margin-left: 15px; padding-left: 20px; position: relative; margin-bottom: 15px; }
    .plan-line::before { content: '⚓'; position: absolute; left: -10px; top: 0; font-size: 12px; background: #fff; }
    .p-time { font-weight: bold; color: var(--accent-gold); font-size: 14px; }
    .p-act { font-weight: bold; font-size: 14px; }
    .p-det { font-size: 12px; color: #888; font-style: italic; }
  </style>
</head>
<body>

<div class="header"><h1>NaviSea 2026</h1><p>〜素敵な冒険の旅を〜</p></div>

<div class="container">
  <div class="card">
    <span class="section-title">🗝 API Key</span>
    <input id="key" type="password" placeholder="Gemini API Key" />
    
    <span class="section-title">📅 Plan Setting</span>
    <div style="display: flex; gap: 8px;">
      <input id="startTime" type="datetime-local" style="flex:1.5;" />
      <select id="persona" style="flex:1;">
        <option value="balanced">おまかせ</option>
        <option value="thrill">絶叫全力！</option>
        <option value="photo">写真映え✨</option>
        <option value="chill">のんびり☕️</option>
      </select>
    </div>
    
    <div id="updateStatus">情報を取得中...</div>
    <span class="section-title">🎀 Select Spots & Events</span>
    <div id="selectionArea" class="selection-container"></div>
    
    <textarea id="notes" placeholder="予定やメモを書いてね" style="height: 60px; margin-top:12px;"></textarea>
    <button id="run" class="btn-primary">⛵ プランを作成する</button>
  </div>

  <div id="resultCard" class="card" style="display:none;">
    <span class="section-title">✨ Your Special Route</span>
    <div id="out"></div>
  </div>

  <div class="debug-panel">
    <div>[Debug Log]</div>
    <div id="debugContent">Waiting for API...</div>
  </div>
</div>

<script>
  const MODEL_NAME = "gemini-2.0-flash";
  // TDSのパークIDは275
  const PROXY_API = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://queue-times.com/parks/275/queue_times.json`)}`;

  // キーワードマッチング用のマスタ
  // queue-times.comは英語名で返ってくることが多いため、キーワードを含めておくと一致しやすくなります
  let masterData = [
    { name: "アナとエルサのフローズンジャーニー", key: "Frozen" },
    { name: "ラプンツェルのランタンフェスティバル", key: "Rapunzel" },
    { name: "ピーターパンのネバーランドアドベンチャー", key: "Peter Pan" },
    { name: "フェアリー・ティンカーベルのビジーバギー", key: "Tinker Bell" },
    { name: "ソアリン：ファンタスティック・フライト", key: "Soaring" },
    { name: "トイ・ストーリー・マニア！", key: "Toy Story" },
    { name: "タワー・オブ・テラー", key: "Tower of Terror" },
    { name: "センター・オブ・ジ・アース", key: "Journey to the Center" },
    { name: "インディ・ジョーンズ®・アドベンチャー", key: "Indiana Jones" },
    { name: "レイジングスピリッツ", key: "Raging Spirits" },
    { name: "ニモ＆フレンズ・シーライダー", key: "SeaRider" },
    { name: "シンドバッド・ストーリーブック", key: "Sinbad" },
    { name: "タートル・トーク", key: "Turtle Talk" },
    { name: "ヴェネツィアン・ゴンドラ", key: "Gondolas" },
    { name: "海底2万マイル", key: "20,000 Leagues" },
    { name: "アクアトピア", key: "Aquatopia" },
    { name: "マジックランプシアター", key: "Magic Lamp" },
    { name: "ジャスミンのフライングカーペット", key: "Flying Carpets" }
  ].map(i => ({ ...i, wait: "--" })).sort((a,b) => a.name.localeCompare(b.name, "ja"));

  let selectedSet = new Set();

  window.onload = () => {
    const now = new Date();
    document.getElementById("startTime").value = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    document.getElementById("key").value = localStorage.getItem("navisea_key") || "";
    renderList();
    updateWaitTimes();
  };

  function renderList() {
    const area = document.getElementById("selectionArea");
    area.innerHTML = "";
    masterData.forEach(item => {
      const isSelected = selectedSet.has(item.name);
      const row = document.createElement("div");
      row.className = `item-row ${isSelected ? 'selected' : ''}`;
      row.innerHTML = `<span class="item-name">${item.name}</span><span class="item-wait">${item.wait}${item.wait.includes("分")||item.wait==="休"||item.wait==="--"?"":"分"}</span>`;
      row.onclick = () => {
        if(selectedSet.has(item.name)) selectedSet.delete(item.name);
        else selectedSet.add(item.name);
        renderList();
      };
      area.appendChild(row);
    });
  }

  async function updateWaitTimes() {
    const status = document.getElementById("updateStatus");
    const debug = document.getElementById("debugContent");
    status.innerText = "⏳ 待ち時間を同期中...";
    
    try {
      const res = await fetch(PROXY_API);
      const wrapper = await res.json();
      
      // デバッグ: APIから何かが返ってきたか確認
      if (!wrapper.contents) {
        debug.innerText = "Error: API response empty (contents missing)";
        return;
      }
      
      const data = JSON.parse(wrapper.contents);
      // queue-times.com の構造: data.lands[i].rides[j]
      const liveRides = data.lands.flatMap(l => l.rides);
      
      debug.innerHTML = `API Success! 取得施設数: ${liveRides.length}<br>`;
      debug.innerHTML += `サンプル(1件目): ${liveRides[0].name} - ${liveRides[0].wait_time}分<br>---<br>`;

      masterData.forEach(item => {
        // 名前かキーワードでマッチング
        const r = liveRides.find(l => 
          l.name.toLowerCase().includes(item.name.toLowerCase()) || 
          (item.key && l.name.toLowerCase().includes(item.key.toLowerCase()))
        );
        
        if(r) {
          item.wait = r.is_open ? r.wait_time.toString() : "休止";
          debug.innerHTML += `Match: ${item.name} -> ${r.name}<br>`;
        }
      });
      
      status.innerText = `✅ ${new Date().toLocaleTimeString()} 更新完了`;
      renderList();
    } catch(e) { 
      status.innerText = "⚠️ 通信エラー";
      debug.innerText = "Error details: " + e.message;
    }
  }

  // ルート生成ロジック (前回のまま)
  document.getElementById("run").onclick = async () => {
    const key = document.getElementById("key").value;
    if(!key) return alert("API Keyを入力してね🔑");
    if(selectedSet.size === 0) return alert("行きたい場所をえらんでね🎀");
    localStorage.setItem("navisea_key", key);
    const out = document.getElementById("out");
    document.getElementById("resultCard").style.display = "block";
    out.innerHTML = "<div style='text-align:center; padding:20px;'>⚓️ 航路計算中...</div>";
    const prompt = `あなたはディズニー好き20代女性。TDS回り方を提案。{"voyage_plan":[{"time":"HH:mm","activity":"場所","details":"助言"}],"tips":["短文"]} JSONのみ。`;
    // ... (fetch部分は前回のロジック通り)
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt + "条件: " + Array.from(selectedSet).join(",") }] }], generationConfig: { responseMimeType: "application/json" } })
      });
      const d = await res.json();
      const plan = JSON.parse(d.candidates[0].content.parts[0].text);
      let html = `<div style="margin-top:10px;">`;
      plan.voyage_plan.forEach(p => html += `<div class="plan-line"><span class="p-time">${p.time}</span><span class="p-act">${p.activity}</span><span class="p-det">${p.details}</span></div>`);
      out.innerHTML = html + `</div>`;
    } catch(e) { out.innerHTML = "エラー。APIキーや通信を確認してね。"; }
  };
</script>
</body>
</html>
